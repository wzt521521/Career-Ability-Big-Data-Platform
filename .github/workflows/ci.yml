name: CI

on:
  pull_request:
    branches:
      - main
      - release/1.0.0-integration
  push:
    branches:
      - main
      - release/1.0.0-integration

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: Career-Ability-Big-Data-Platform/backend/pom.xml
      - name: Verify backend and coverage gate
        run: ./mvnw -B verify
      - name: Upload Surefire reports and JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            Career-Ability-Big-Data-Platform/backend/target/surefire-reports/**
            Career-Ability-Big-Data-Platform/backend/target/site/jacoco/**
          if-no-files-found: warn

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Career-Ability-Big-Data-Platform/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Upload Vitest reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            Career-Ability-Big-Data-Platform/frontend/test-results/**
            Career-Ability-Big-Data-Platform/frontend/coverage/**
          if-no-files-found: warn

  data-pipeline:
    name: data-pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
            Career-Ability-Big-Data-Platform/data-pipeline/requirements-test.txt
      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run isolated data pipeline tests
        run: |
          python -m pytest -m "not integration"
          python scripts/check_coverage.py coverage.xml
      - name: Upload pytest reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-unit-test-results
          path: |
            Career-Ability-Big-Data-Platform/data-pipeline/test-results/**
            Career-Ability-Big-Data-Platform/data-pipeline/coverage.xml
          if-no-files-found: warn

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_DATABASE: career_ability_test
          MYSQL_USER: career_test
          MYSQL_PASSWORD: career_test_password
          MYSQL_ROOT_PASSWORD: root_test_password
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot_test_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
            Career-Ability-Big-Data-Platform/data-pipeline/requirements-test.txt
      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run MySQL 8 and Redis 7 integration tests
        env:
          PIPELINE_RUN_INTEGRATION: '1'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          REDIS_DB: '0'
          PIPELINE_TEST_REDIS_DB: '15'
          PIPELINE_TEST_REDIS_PREFIX: pipeline:test
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: '3306'
          MYSQL_USER: root
          MYSQL_PASSWORD: root_test_password
          MYSQL_DATABASE: career_ability_test
          PIPELINE_TEST_MYSQL_DATABASE: career_ability_pipeline_test
        run: python -m pytest -m integration
      - name: Upload integration test reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            Career-Ability-Big-Data-Platform/data-pipeline/test-results/**
            Career-Ability-Big-Data-Platform/data-pipeline/coverage.xml
          if-no-files-found: warn

  compose:
    name: compose
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-only-non-production-secret-that-is-long-enough
      MYSQL_ROOT_PASSWORD: ci-local-mysql-password
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml config --quiet
      - name: Build and wait for the complete Compose stack
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          up -d --build --wait --wait-timeout 300
      - name: Verify the CSV to Redis to MySQL ETL flow
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          exec -T python-etl python scripts/verify_compose_pipeline.py
          --csv /data/kaggle_jobs_500.csv --timeout-seconds 180
      - name: Capture Compose diagnostics
        if: always()
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          logs --no-color > compose.log 2>&1 || true
      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-diagnostics
          path: compose.log
          if-no-files-found: warn
      - name: Remove Compose resources
        if: always()
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          down -v --remove-orphans
