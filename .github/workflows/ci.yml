name: CI

on:
  pull_request:
    branches:
      - main
      - release/1.0.0-integration
  push:
    branches:
      - main
      - release/1.0.0-integration

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Detect backend changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="HEAD^"
          fi
          if git diff --name-only "$base" HEAD | grep -q '^Career-Ability-Big-Data-Platform/backend/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up JDK 17
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: Career-Ability-Big-Data-Platform/backend/pom.xml
      - name: Verify backend
        if: steps.changes.outputs.run == 'true'
        working-directory: Career-Ability-Big-Data-Platform/backend
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Record skipped backend check
        if: steps.changes.outputs.run != 'true'
        run: echo "No backend files changed."

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Detect frontend changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="HEAD^"
          fi
          if git diff --name-only "$base" HEAD | grep -q '^Career-Ability-Big-Data-Platform/frontend/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node.js 20
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Career-Ability-Big-Data-Platform/frontend/package-lock.json
      - name: Verify frontend
        if: steps.changes.outputs.run == 'true'
        working-directory: Career-Ability-Big-Data-Platform/frontend
        run: |
          npm ci
          npm test
          npm run lint
          npm run build
      - name: Record skipped frontend check
        if: steps.changes.outputs.run != 'true'
        run: echo "No frontend files changed."

  data-pipeline:
    name: data-pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Detect data pipeline changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="HEAD^"
          fi
          if git diff --name-only "$base" HEAD | grep -q '^Career-Ability-Big-Data-Platform/data-pipeline/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python 3.10
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
      - name: Verify data pipeline
        if: steps.changes.outputs.run == 'true'
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pytest -q
      - name: Record skipped data pipeline check
        if: steps.changes.outputs.run != 'true'
        run: echo "No data pipeline files changed."

  compose:
    name: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Detect Compose changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="HEAD^"
          fi
          pattern='^Career-Ability-Big-Data-Platform/(docker-compose\.ya?ml|backend/Dockerfile|frontend/Dockerfile|data-pipeline/Dockerfile)$'
          if git diff --name-only "$base" HEAD | grep -Eq "$pattern"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate Compose configuration
        if: steps.changes.outputs.run == 'true'
        run: docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml config --quiet
      - name: Record skipped Compose check
        if: steps.changes.outputs.run != 'true'
        run: echo "No Compose or Dockerfile changes detected."
