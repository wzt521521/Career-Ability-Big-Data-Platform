name: CI

on:
  pull_request:
    branches:
      - main
      - release/1.0.0-integration
  push:
    branches:
      - main
      - release/1.0.0-integration

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: Career-Ability-Big-Data-Platform/backend/pom.xml
      - name: Verify backend and coverage gate
        run: ./mvnw -B verify
      - name: Upload Surefire reports and JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            Career-Ability-Big-Data-Platform/backend/target/surefire-reports/**
            Career-Ability-Big-Data-Platform/backend/target/site/jacoco/**
          if-no-files-found: warn

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Career-Ability-Big-Data-Platform/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Upload Vitest reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            Career-Ability-Big-Data-Platform/frontend/test-results/**
            Career-Ability-Big-Data-Platform/frontend/coverage/**
          if-no-files-found: warn

  data-pipeline:
    name: data-pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
            Career-Ability-Big-Data-Platform/data-pipeline/requirements-test.txt
      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run isolated data pipeline tests
        run: |
          python -m pytest -m "not integration"
          python scripts/check_coverage.py coverage.xml
      - name: Upload pytest reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-unit-test-results
          path: |
            Career-Ability-Big-Data-Platform/data-pipeline/test-results/**
            Career-Ability-Big-Data-Platform/data-pipeline/coverage.xml
          if-no-files-found: warn

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_DATABASE: career_ability_test
          MYSQL_USER: career_test
          MYSQL_PASSWORD: career_test_password
          MYSQL_ROOT_PASSWORD: root_test_password
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot_test_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
            Career-Ability-Big-Data-Platform/data-pipeline/requirements-test.txt
      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run MySQL 8 and Redis 7 integration tests
        env:
          PIPELINE_RUN_INTEGRATION: '1'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          REDIS_DB: '0'
          PIPELINE_TEST_REDIS_DB: '15'
          PIPELINE_TEST_REDIS_PREFIX: pipeline:test
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: '3306'
          MYSQL_USER: root
          MYSQL_PASSWORD: root_test_password
          MYSQL_DATABASE: career_ability_test
          PIPELINE_TEST_MYSQL_DATABASE: career_ability_pipeline_test
        run: python -m pytest -m integration
      - name: Verify MySQL 8 analytics query plan and P95
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: '3306'
          MYSQL_USER: root
          MYSQL_PASSWORD: root_test_password
          MYSQL_DATABASE: career_ability_test
          ANALYTICS_SEARCH_P95_SECONDS: '1.0'
        run: python scripts/verify_analytics_mysql_performance.py
      - name: Upload integration test reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            Career-Ability-Big-Data-Platform/data-pipeline/test-results/**
            Career-Ability-Big-Data-Platform/data-pipeline/coverage.xml
          if-no-files-found: warn

  compose:
    name: compose
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-only-non-production-secret-that-is-long-enough
      MYSQL_ROOT_PASSWORD: ci-local-mysql-password
      MYSQL_APP_USER: career_app
      MYSQL_APP_PASSWORD: ci-local-app-password
      MYSQL_MIGRATOR_USER: career_migrator
      MYSQL_MIGRATOR_PASSWORD: ci-local-migrator-password
      REDIS_PASSWORD: ci-local-redis-password
      INITIAL_ADMIN_USERNAME: ciadmin
      INITIAL_ADMIN_PASSWORD: ci-bootstrap-${{ github.run_id }}-not-for-production
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml config --quiet
      - name: Build and wait for the complete Compose stack
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          up -d --build --wait --wait-timeout 300
      - name: Verify the CSV to Redis to MySQL ETL flow
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          exec -T python-etl python scripts/verify_compose_pipeline.py
          --csv /data/kaggle_jobs_500.csv --timeout-seconds 180
      - name: Verify release-critical HTTP and permission flows
        run: >-
          python Career-Ability-Big-Data-Platform/scripts/verify_compose_release.py
          --base-url http://127.0.0.1:8080 --timeout-seconds 180
      - name: Install PDF text verification tool
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils
      - name: Verify report persistence and Chinese font availability
        run: >-
          python Career-Ability-Big-Data-Platform/scripts/verify_compose_reports.py
          --compose-file Career-Ability-Big-Data-Platform/docker-compose.yml
          --timeout-seconds 180
      - name: Verify backup and restore integrity
        run: >-
          python Career-Ability-Big-Data-Platform/scripts/verify_compose_backup_restore.py
          --compose-file Career-Ability-Big-Data-Platform/docker-compose.yml
          --timeout-seconds 240
      - name: Verify HTTP performance envelope
        run: >-
          python Career-Ability-Big-Data-Platform/scripts/verify_compose_performance.py
          --base-url http://127.0.0.1:8080 --runs 6 --timeout-seconds 180
      - name: Export OpenAPI artifact
        run: >-
          mkdir -p release-artifacts &&
          curl --fail --silent --show-error
          http://127.0.0.1:8080/v3/api-docs
          -o release-artifacts/openapi.json
      - name: Install Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.49.1
          python -m playwright install --with-deps chromium
      - name: Verify frontend in real browser and capture screenshots
        run: >-
          python Career-Ability-Big-Data-Platform/scripts/verify_compose_browser.py
          --base-url http://127.0.0.1
          --output-dir release-artifacts/browser-screenshots
          --timeout-ms 30000
      - name: Capture Compose diagnostics
        if: always()
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          logs --no-color > compose.log 2>&1 || true
      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-diagnostics
          path: compose.log
          if-no-files-found: warn
      - name: Upload release acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance-artifacts
          path: release-artifacts/**
          if-no-files-found: warn
      - name: Remove Compose resources
        if: always()
        run: >-
          docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml
          down -v --remove-orphans

  security:
    name: security
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ci-security-${{ github.run_id }}
      JWT_SECRET: ci-only-non-production-secret-that-is-long-enough
      MYSQL_ROOT_PASSWORD: ci-local-mysql-password
      MYSQL_APP_USER: career_app
      MYSQL_APP_PASSWORD: ci-local-app-password
      MYSQL_MIGRATOR_USER: career_migrator
      MYSQL_MIGRATOR_PASSWORD: ci-local-migrator-password
      REDIS_PASSWORD: ci-local-redis-password
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: Career-Ability-Big-Data-Platform/backend/pom.xml
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Career-Ability-Big-Data-Platform/frontend/package-lock.json
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            Career-Ability-Big-Data-Platform/data-pipeline/requirements.txt
            Career-Ability-Big-Data-Platform/data-pipeline/requirements-test.txt
      - name: Scan current tree and Git history for secrets
        run: python Career-Ability-Big-Data-Platform/scripts/scan_secrets.py --include-history
      - name: Scan dependency manifests with Trivy
        run: >-
          docker run --rm
          -v "$PWD:/work" -w /work
          -v "$PWD/trivy-cache:/root/.cache/"
          aquasec/trivy:0.58.1 fs
          --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --ignorefile .trivyignore
          Career-Ability-Big-Data-Platform
      - name: Generate backend SBOM
        working-directory: Career-Ability-Big-Data-Platform/backend
        run: mvn -B -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom
      - name: Audit frontend production dependencies and generate SBOM
        working-directory: Career-Ability-Big-Data-Platform/frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npx --yes @cyclonedx/cyclonedx-npm@1.19.3 --omit dev --output-file bom.json
          npx --yes license-checker@25.0.1 --production --json --out licenses.json
      - name: Audit Python dependencies and generate SBOM
        working-directory: Career-Ability-Big-Data-Platform/data-pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.7.3 pip-licenses==5.0.0
          pip-audit -r requirements.txt --strict
          pip-licenses --format=json --with-urls --output-file licenses.json
          python -m pip install --upgrade cyclonedx-bom==5.0.0
          cyclonedx-py requirements requirements.txt -o bom.json
      - name: Validate Compose configuration for image build
        run: docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml config --quiet
      - name: Build release images
        run: docker compose -f Career-Ability-Big-Data-Platform/docker-compose.yml build
      - name: Scan release images with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/work" -v "$PWD/trivy-cache:/root/.cache/" aquasec/trivy:0.58.1 image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --ignorefile /work/.trivyignore career-ability-backend:${IMAGE_TAG}
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/work" -v "$PWD/trivy-cache:/root/.cache/" aquasec/trivy:0.58.1 image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --ignorefile /work/.trivyignore career-ability-frontend:${IMAGE_TAG}
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/work" -v "$PWD/trivy-cache:/root/.cache/" aquasec/trivy:0.58.1 image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --ignorefile /work/.trivyignore career-ability-data-pipeline:${IMAGE_TAG}
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            Career-Ability-Big-Data-Platform/backend/target/bom.*
            Career-Ability-Big-Data-Platform/frontend/bom.json
            Career-Ability-Big-Data-Platform/frontend/licenses.json
            Career-Ability-Big-Data-Platform/data-pipeline/bom.json
            Career-Ability-Big-Data-Platform/data-pipeline/licenses.json
          if-no-files-found: warn
