name: v1.0 release task
description: Track one independently verifiable task from the v1.0 release checklist.
title: "[TASK-ID] "
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: Use the exact ID from the release checklist, for example R1-01 or D-05.
      placeholder: R1-01
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - blocks RC
        - P1 - blocks v1.0.0
        - P2 - may move to v1.1
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe one problem and the intended behavior. Split unrelated work into another issue.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable pass/fail conditions.
      placeholder: |
        - [ ] Behavior is covered by an automated test or repeatable script.
        - [ ] Failure and rollback paths are verified.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification commands
      description: Provide exact commands and required environment or fixtures.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and risks
      description: Link blocking issues and record migration, compatibility, security, or data-loss risks.
