x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.0.40
    container_name: job-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-career_ability}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      # The MySQL entrypoint executes init.sql only while mysql-data is empty.
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - job-data-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-name-resolve
    stop_grace_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  redis:
    image: redis:7.4.2-alpine
    container_name: job-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      TZ: Asia/Shanghai
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["/bin/sh", "-ec", "exec redis-server /usr/local/etc/redis/redis.conf --requirepass \"$${REDIS_PASSWORD}\""]
    networks:
      - job-data-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  db-migrate:
    image: career-ability-data-pipeline:${IMAGE_TAG:-local}
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: job-db-migrate
    restart: "no"
    init: true
    command: ["python", "scripts/run_migrations.py"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-career_ability}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_APP_USER: ${MYSQL_APP_USER:-career_app}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD must be set}
      MYSQL_MIGRATOR_USER: ${MYSQL_MIGRATOR_USER:-career_migrator}
      MYSQL_MIGRATOR_PASSWORD: ${MYSQL_MIGRATOR_PASSWORD:?MYSQL_MIGRATOR_PASSWORD must be set}
      MIGRATION_LOCK_TIMEOUT_SECONDS: ${MIGRATION_LOCK_TIMEOUT_SECONDS:-60}
      MIGRATIONS_DIR: /sql/migrations
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - job-data-net
    volumes:
      - ./sql:/sql:ro
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  backend:
    image: career-ability-backend:${IMAGE_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-backend
    restart: unless-stopped
    init: true
    ports:
      # Kept on loopback for Compose E2E checks and a local reverse proxy.
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-career_ability}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-career_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD must be set}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      SPRING_CACHE_TYPE: redis
      SPRING_PROFILES_ACTIVE: production
      SERVER_SHUTDOWN: graceful
      SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: 30s
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-${JWT_SECRET:?JWT_SECRET must be set in .env}}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      SECURITY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      REPORT_OUTPUT_DIR: /var/lib/career-ability/reports
      REPORT_FONT_FILE: /usr/share/fonts/noto/NotoSansSC.ttf
      REPORT_REQUIRE_CHINESE_FONT: "true"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - report-data:/var/lib/career-ability/reports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - job-app-net
      - job-data-net
    stop_signal: SIGTERM
    stop_grace_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1024M

  frontend:
    image: career-ability-frontend:${IMAGE_TAG:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-frontend
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - job-app-net
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  python-etl:
    image: career-ability-data-pipeline:${IMAGE_TAG:-local}
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: job-etl
    restart: unless-stopped
    init: true
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_APP_USER:-career_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD must be set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-career_ability}
      POSITION_DATA_VERSION_KEY: career:position-data-version
      CSV_PATH: /data/kaggle_jobs_500.csv
      ETL_HEARTBEAT_FILE: /tmp/etl-heartbeat
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys, time; path = os.getenv('ETL_HEARTBEAT_FILE', '/tmp/etl-heartbeat'); sys.exit(0 if os.path.exists(path) and time.time() - os.path.getmtime(path) < 90 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - job-data-net
    stop_signal: SIGTERM
    stop_grace_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

volumes:
  mysql-data:
  redis-data:
  report-data:

networks:
  job-app-net:
    driver: bridge
  job-data-net:
    driver: bridge
    internal: true
