services:
  # ============================================================
  # 1. MySQL 8.0 — 核心业务数据库
  # ============================================================
  mysql:
    image: mysql:8.0.40
    container_name: job-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-development-password}
      MYSQL_DATABASE: career_ability
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - job-data-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # ============================================================
  # 2. Redis 7 — 缓存 + 消息队列
  # ============================================================
  redis:
    image: redis:7.4.2-alpine
    container_name: job-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - job-data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 3. Spring Boot 后端 (需要先写好 Dockerfile)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/career_ability?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-development-password}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SECURITY_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      SECURITY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - job-data-net

  # ============================================================
  # 4. Vue 前端 (需要先写好 Dockerfile)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - job-data-net

  # ============================================================
  # 5. Python ETL 清洗脚本 (需要先写好 Dockerfile)
  # ============================================================
  python-etl:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: job-etl
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-development-password}
      MYSQL_DATABASE: career_ability
      CSV_PATH: /data/kaggle_jobs_500.csv
      ETL_HEARTBEAT_FILE: /tmp/etl-heartbeat
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    networks:
      - job-data-net

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql-data:
  redis-data:

# ============================================================
# 自定义网络
# ============================================================
networks:
  job-data-net:
    driver: bridge
