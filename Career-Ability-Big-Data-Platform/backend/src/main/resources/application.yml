server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: ${SERVER_MAX_HTTP_FORM_POST_SIZE:2MB}
    max-swallow-size: ${SERVER_MAX_SWALLOW_SIZE:2MB}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: career-ability-backend
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/career_ability?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    redis:
      time-to-live: 30m
      cache-null-values: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,redis,reportStorage
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:${JWT_SECRET:local-development-secret-change-me-32-bytes}}
    access-token-ttl: ${JWT_ACCESS_TTL:PT2H}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost}
  rate-limit:
    enabled: ${BUSINESS_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${BUSINESS_RATE_LIMIT_REQUESTS_PER_MINUTE:600}

app:
  bootstrap:
    admin:
      username: ${INITIAL_ADMIN_USERNAME:}
      password: ${INITIAL_ADMIN_PASSWORD:}
  analytics:
    schedule: ${ANALYTICS_CRON:0 0 2 * * *}
    lock-key: lock:analytics:daily
    lock-seconds: 1800
  report:
    output-dir: ${REPORT_OUTPUT_DIR:/var/lib/career-ability/reports}
    font-file: ${REPORT_FONT_FILE:/usr/share/fonts/noto/NotoSansSC.ttf}
    require-chinese-font: ${REPORT_REQUIRE_CHINESE_FONT:false}
    max-attempts: ${REPORT_MAX_ATTEMPTS:3}
    pending-timeout-seconds: ${REPORT_PENDING_TIMEOUT_SECONDS:120}
    generating-timeout-seconds: ${REPORT_GENERATING_TIMEOUT_SECONDS:1800}
    recovery-delay-ms: ${REPORT_RECOVERY_DELAY_MS:60000}
  recommend:
    position-data-version-key: ${POSITION_DATA_VERSION_KEY:career:position-data-version}

logging:
  level:
    com.career.platform: INFO
