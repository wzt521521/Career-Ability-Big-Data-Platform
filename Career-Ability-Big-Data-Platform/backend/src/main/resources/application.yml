server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: career-ability-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/career_ability?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    redis:
      time-to-live: 30m
      cache-null-values: false

app:
  analytics:
    schedule: ${ANALYTICS_CRON:0 0 2 * * *}
    lock-key: lock:analytics:daily
    lock-seconds: 1800

logging:
  level:
    com.career.platform: INFO
