server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: career-ability-backend
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/career_ability?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    redis:
      time-to-live: 30m
      cache-null-values: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,redis

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:${JWT_SECRET:local-development-secret-change-me-32-bytes}}
    access-token-ttl: ${JWT_ACCESS_TTL:PT2H}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost}

app:
  analytics:
    schedule: ${ANALYTICS_CRON:0 0 2 * * *}
    lock-key: lock:analytics:daily
    lock-seconds: 1800

logging:
  level:
    com.career.platform: INFO
