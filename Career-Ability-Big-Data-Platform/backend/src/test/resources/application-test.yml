spring:
  datasource:
    url: jdbc:h2:mem:career_ability;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: none
  task:
    scheduling:
      enabled: false

app:
  analytics:
    schedule: "0 0 0 1 1 *"
