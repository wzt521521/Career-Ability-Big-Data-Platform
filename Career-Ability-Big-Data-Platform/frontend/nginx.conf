worker_processes auto;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 2m;
  gzip on;
  gzip_min_length 1k;
  gzip_types text/plain text/css application/json application/javascript;
  # TLS terminates at a trusted external ingress. Preserve its protocol header for Spring's
  # forwarded-header handling, while allowing local HTTP development without that ingress.
  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }
  server {
    listen 80;
    root /usr/share/nginx/html;
    location / {
      add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;
      add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      try_files $uri $uri/ /index.html;
    }
    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 300s;
    }
    location /v3/api-docs {
      proxy_pass http://backend:8080/v3/api-docs;
    }
    location /swagger-ui/ {
      proxy_pass http://backend:8080/swagger-ui/;
    }
    location /webjars/ {
      proxy_pass http://backend:8080/webjars/;
    }
  }
}
