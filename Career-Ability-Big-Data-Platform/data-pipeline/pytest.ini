[pytest]
testpaths = .
python_files = test_*.py
addopts =
    -m "not integration"
    --strict-markers
    --junitxml=test-results/pytest.xml
    --cov=etl_clean
    --cov=import_data
    --cov-branch
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
markers =
    integration: requires reachable Redis and MySQL services; run explicitly with -m integration
